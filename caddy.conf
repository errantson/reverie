auth.reverie.house {
    import log_config
    
    # OAuth authorization server metadata
    handle /.well-known/oauth-authorization-server {
        reverse_proxy 172.23.0.1:3333 {
            header_up Host auth.reverie.house
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # OAuth protected resource metadata
    handle /.well-known/oauth-protected-resource {
        reverse_proxy 172.23.0.1:3333 {
            header_up Host auth.reverie.house
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # OAuth endpoints
    handle /oauth/* {
        reverse_proxy 172.23.0.1:3333 {
            header_up Host auth.reverie.house
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # OAuth provider UI assets
    handle /@atproto/* {
        reverse_proxy 172.23.0.1:3333 {
            header_up Host auth.reverie.house
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
}

# Main domain
reverie.house {
    import log_config
    
    # CORS headers for all responses
    header {
        Access-Control-Allow-Origin "*"
        Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, atproto-accept-labelers, atproto-proxy, x-bsky-topics"
        Access-Control-Max-Age "86400"
    }
    
    # DID resolution - must be fast, no filesystem checks
    handle_path /.well-known/atproto-did {
        header Content-Type "text/plain"
        respond "did:plc:yauphjufk7phkwurn266ybx2"
    }
    
    # Feed Generator DID document
    handle /.well-known/did.json {
        reverse_proxy 172.23.0.16:3001 {
            header_up Host {host}
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # Feed Generator XRPC endpoints
    handle /xrpc/app.bsky.feed.describeFeedGenerator {
        reverse_proxy 172.23.0.16:3001 {
            header_up Host {host}
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    handle /xrpc/app.bsky.feed.getFeedSkeleton {
        reverse_proxy 172.23.0.16:3001 {
            header_up Host {host}
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # OAuth authorization server metadata - points to auth subdomain
    handle /.well-known/oauth-authorization-server {
        reverse_proxy 172.23.0.1:3333 {
            header_up Host auth.reverie.house
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # OAuth protected resource metadata - points to auth subdomain
    handle /.well-known/oauth-protected-resource {
        root * /srv/site
        header Content-Type "application/json"
        file_server
    }
    
    # OAuth client metadata
    handle /client-metadata.json {
        root * /srv/site
        file_server
    }
    
    # OAuth callback (frontend page)
    handle /oauth/callback {
        root * /srv/site
        rewrite * /oauth-callback.html
        file_server
    }
    
    # XRPC proxy - direct to PDS
    handle /xrpc/* {
        reverse_proxy 172.23.0.1:3333 {
            header_up Host {host}
            header_up X-Forwarded-For {remote}
            header_down -Access-Control-Allow-Origin
            header_down -Access-Control-Allow-Methods
            header_down -Access-Control-Allow-Headers
            header_down -Access-Control-Allow-Credentials
        }
    }
    
    # Stripe API proxy
    handle_path /api/stripe/* {
        reverse_proxy 172.23.0.8:5555
    }
    
    # Auth API proxy
    handle_path /api/auth/* {
        reverse_proxy 172.23.0.12:4444
    }
    
    # Admin API proxy - internal only, proxied through Caddy
    handle /api/admin/* {
        reverse_proxy 172.23.0.12:4444 {
            header_up Host {host}
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # Admin interface - serve static files
    handle /admin/* {
        root * /srv/site
        try_files {path} /admin/login.html
        file_server
    }
    
    # All API routes go to admin server on 4444
    handle /api/* {
        reverse_proxy 172.23.0.12:4444 {
            flush_interval -1
        }
    }
    
    # Origin routes - dynamic OG preview for spectrum origins (MUST be before /spectrum)
    handle /origin.html* {
        reverse_proxy 172.23.0.12:4444 {
            header_up Host {host}
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    handle /origin/* {
        reverse_proxy 172.23.0.12:4444 {
            header_up Host {host}
            header_up X-Forwarded-For {remote}
            header_up X-Forwarded-Proto https
        }
    }
    
    # Legacy redirects
    handle /print* {
        redir /order{uri} 301
    }
    handle /press* {
        redir /order{uri} 301
    }
    handle /shop* {
        redir /order{uri} 301
    }
    
    # Explore - Redirect to Bluesky profile
    handle /explore* {
        redir https://bsky.app/profile/did:plc:yauphjufk7phkwurn266ybx2{uri} 302
    }
    
    # Home route (redirect from /)
    handle /home* {
        root * /srv/site
        try_files {path} /index.html
        file_server
    }
    
    # Books/Library routes - serve library.html for app routes, files for assets
    handle /books* {
        root * /srv/site
        # try_files will serve actual files if they exist, otherwise library.html
        try_files {path} /library.html
        file_server
    }
    
    handle /library* {
        root * /srv/site
        try_files {path} /library.html
        file_server
    }
    
    # Order page
    handle /order* {
        root * /srv/site
        try_files {path} /order.html
        file_server
    }
    
    # Dreamers page
    handle /dreamer* {
        root * /srv/site
        try_files {path} /dreamer.html
        file_server
    }
    
    # Canon/Story/Lore pages - all redirect to story.html
    handle /canon* {
        root * /srv/site
        try_files {path} /story.html
        file_server
    }
    
    handle /story* {
        root * /srv/site
        try_files {path} /story.html
        file_server
    }
    
    handle /lore* {
        root * /srv/site
        try_files {path} /story.html
        file_server
    }
    
    # Souvenirs page
    handle /souvenirs* {
        root * /srv/site
        try_files {path} /souvenirs.html
        file_server
    }
    
    # Spectrum page
    handle /spectrum* {
        root * /srv/site
        try_files {path} /spectrum.html
        file_server
    }
    
    # Database page
    handle /database* {
        root * /srv/site
        try_files {path} /database.html
        file_server
    }
    
    # Privacy page
    handle /privacy* {
        root * /srv/site
        try_files {path} /privacy.html
        file_server
    }
    
    # Work page
	handle /work {
		rewrite * /work.html
		file_server {
			root /srv/site
		}
	}
	
    # Dreams system - individual dream routes
    handle /dreams/avonlea.town* {
        uri strip_prefix /dreams/avonlea.town
        root * /srv/site/dreams/avonlea.town
        try_files {path} /index.html
        file_server
    }
    
    handle /dreams/flawed.center* {
        uri strip_prefix /dreams/flawed.center
        root * /srv/site/dreams/flawed.center
        try_files {path} /index.html
        file_server
    }
    
    # Dreams directory/index
    handle /dreams* {
        root * /srv/site
        try_files {path} /dreams/index.html
        file_server
    }
    
    # Default: serve static files or index.html
    handle {
        root * /srv/site
        encode gzip
        try_files {path} {path}/index.html /index.html
        file_server
    }
}

